<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Integration Demo</title>
    <link rel="stylesheet" href="/chat-widget.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: #f6f2eb;
        color: #1f2430;
      }

      .demo-card {
        width: min(680px, 100%);
        padding: 28px;
        border: 1px solid rgba(31, 36, 48, 0.12);
        border-radius: 20px;
        background: #fffdf9;
        box-shadow: 0 18px 42px rgba(31, 36, 48, 0.08);
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.6;
        color: #5f6778;
      }

      .demo-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .demo-link,
      .demo-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .demo-link {
        color: #fff;
        background: #d95d39;
      }

      .demo-button {
        border: 1px solid rgba(31, 36, 48, 0.12);
        background: #fff;
        color: #1f2430;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #f2ece4;
      }
    </style>
  </head>
  <body>
    <main class="demo-card">
      <h1>Chatbot Widget Demo</h1>
      <p>
        This page is only a minimal demo. You can replace it with your own website and keep using
        the chatbot widget files.
      </p>
      <p>
        To open the chatbot from your own website, add
        <code>data-chatbot-open</code> to any link or button.
      </p>
      <div class="demo-actions">
        <a class="demo-link" href="#chatbot" data-chatbot-open>Open Chatbot From Link</a>
        <button class="demo-button" type="button" data-chatbot-open>Open Chatbot From Button</button>
      </div>
    </main>

    <script src="/chat-widget.js"></script>
  </body>
</html>
